run_name: full
output_root: outputs
seed: 0
gamma: 0.01
repetitions: 20000
chunk_size: 2000
batch_sizes: [8, 32, 128]
microbatches: [2, 4, 8, 16]
populations:
  - {name: gaussian, mean: 0.5, std: 1.0}
  - {name: student_t, df: 5, mean: 0.5, std: 1.0}
  - {name: centered_lognormal, mean: 0.5, log_std: 0.8}
  - {name: finite_population, population_size: 10000, mean: 0.5, std: 1.0}
  - {name: quadratic, theta: 1.0, data_mean: 0.25, data_std: 1.0}
  - {name: linear_regression, theta: 1.0, beta: 0.5, noise_std: 0.5}
  - {name: logistic_regression, theta: 1.0, beta: 0.25}

